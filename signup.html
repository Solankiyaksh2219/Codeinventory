<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account - Inventory System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-box">
  <h1>Create Your Account</h1>
  <p class="subtitle">Enter your details to get started</p>

  <form id="signupForm">
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="Your name" required>

    <label for="signupEmail">Email Address</label>
    <input type="email" id="signupEmail" placeholder="example@email.com" required>

    <label for="signupPassword">Password</label>
    <input type="password" id="signupPassword" placeholder="••••••••" required>

    <div id="signupError" class="error-message" aria-live="polite" style="color:#fb7185; font-size:12px; min-height:18px; margin-bottom:12px;"></div>

    <button type="submit" class="btn-primary">Create Account</button>
    <button type="button" class="btn-secondary" id="backToLogin" style="margin-top:10px;">Back to Login</button>
  </form>

  <div class="footer">
    Already have an account? <span id="loginLink" style="color:var(--secondary); cursor:pointer;">Sign In</span>
  </div>
</div>

<script>
  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function setLoggedIn(user = {}) {
    localStorage.setItem('loggedIn', 'true');
    localStorage.setItem('currentUser', JSON.stringify(user));
  }

  document.addEventListener('DOMContentLoaded', () => {
    const signupForm = document.getElementById('signupForm');
    const fullName = document.getElementById('fullName');
    const email = document.getElementById('signupEmail');
    const password = document.getElementById('signupPassword');
    const signupError = document.getElementById('signupError');
    const backToLogin = document.getElementById('backToLogin');
    const loginLink = document.getElementById('loginLink');

    function showError(message) {
      signupError.textContent = message;
    }

    signupForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const nameValue = fullName.value.trim();
      const emailValue = email.value.trim();
      const passwordValue = password.value;

      if (!nameValue || !emailValue || !passwordValue) {
        showError('All fields are required.');
        return;
      }

      if (!validateEmail(emailValue)) {
        showError('Please provide a valid email address.');
        return;
      }

      if (passwordValue.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      setLoggedIn({ name: nameValue, email: emailValue });
      window.location.href = 'dashboard.html';
    });

    backToLogin.addEventListener('click', () => {
      window.location.href = 'login.html';
    });

    loginLink.addEventListener('click', () => {
      window.location.href = 'login.html';
    });
  });
</script>
</body>
</html>
